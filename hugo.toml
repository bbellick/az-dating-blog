baseURL = "https://azrandevu.com/"
locale = "az"
defaultContentLanguage = "az"
title = "Azərbaycanda Tanışlıq"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Azərbaycanda tanışlıq saytları haqqında dürüst rəylər. Tinder, Badoo, Datibee — real təcrübə əsasında LuRa Ratio qiymətləndirməsi."
  author = "Redaktor"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowFullTextInRSS = false
  hidemeta = false
  comments = false

  [params.homeInfoParams]
    Title = "Azərbaycanda Tanışlıq"
    Content = "Tinder, Badoo, Datibee — Azərbaycanda real istifadə əsasında dürüst rəylər. Hansı saytı seçmək lazımdır? LuRa Ratio ilə müqayisəli qiymətləndirmə."

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "obzor"
    name = "Rəylər"
    url = "/obzor/"
    weight = 10
  [[menu.main]]
    identifier = "metodologiya"
    name = "Metodologiya"
    url = "/metodologiya/"
    weight = 35
  [[menu.main]]
    identifier = "haqqimda"
    name = "Haqqımda"
    url = "/haqqimda/"
    weight = 40

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[permalinks]
  obzor = "/obzor/:slug/"
